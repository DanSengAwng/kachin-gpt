<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kachin GPT — Fine-Tuning Studio</title>
<style>
  :root {
    --navy:#1A2940; --blue:#2E6FA8; --amber:#E8A020; --green:#2E9B57; --red:#C0392B;
    --bg:#eef2f6; --card:#fff; --line:#d7e0e8; --muted:#5A6A7A;
  }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    margin:0; background:var(--bg); color:var(--navy); }
  header { background:var(--navy); color:#fff; padding:14px 20px; display:flex;
    align-items:center; justify-content:space-between; }
  header h1 { font-size:18px; margin:0; font-weight:700; }
  header .dot { font-size:13px; color:#cfe0ee; }
  .dot b { color:#fff; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; max-width:1100px;
    margin:18px auto; padding:0 18px; align-items:start; }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px; }
  .card h2 { font-size:15px; margin:0 0 12px; }
  /* chat */
  #log { height:340px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
    padding-right:4px; }
  .msg { max-width:88%; padding:9px 12px; border-radius:12px; font-size:14px;
    line-height:1.45; white-space:pre-wrap; }
  .msg.you { align-self:flex-end; background:var(--blue); color:#fff; }
  .msg.bot { align-self:flex-start; background:#eef2f6; border:1px solid var(--line); }
  .chatrow { display:flex; gap:8px; margin-top:12px; }
  .chatrow input { flex:1; font-size:15px; padding:10px; border:1.5px solid var(--line);
    border-radius:10px; }
  button { font-weight:700; color:#fff; background:var(--blue); border:none;
    border-radius:10px; padding:10px 16px; cursor:pointer; font-size:14px; }
  button:disabled { background:#9db6cc; cursor:not-allowed; }
  button.ghost { background:#eef2f6; color:var(--navy); border:1px solid var(--line); }
  /* add clip */
  label { display:block; font-weight:600; font-size:13px; margin:10px 0 5px; }
  input[type=text], textarea { width:100%; font-size:15px; padding:10px;
    border:1.5px solid var(--line); border-radius:10px; font-family:inherit; }
  textarea { min-height:60px; resize:vertical; }
  .drop { border:2px dashed var(--line); border-radius:12px; padding:18px; text-align:center;
    color:var(--muted); font-size:14px; cursor:pointer; background:#fafcfe; }
  .drop.hot { border-color:var(--blue); background:#eef5fb; }
  .verdict { font-size:13px; margin-top:8px; padding:8px 10px; border-radius:8px; display:none; }
  .verdict.PASS{ background:#e7f6ec; color:var(--green); display:block; }
  .verdict.WARN{ background:#fdf3e2; color:#a9720f; display:block; }
  .verdict.FAIL{ background:#fbe9e7; color:var(--red); display:block; }
  /* dashboard */
  .big { font-size:30px; font-weight:800; }
  .stats { display:flex; gap:20px; margin-bottom:6px; }
  .stat small { display:block; color:var(--muted); font-size:12px; font-weight:600;
    text-transform:uppercase; letter-spacing:.03em; }
  .bar { height:10px; background:#e6edf3; border-radius:6px; overflow:hidden; margin:10px 0; }
  .bar>div { height:100%; background:var(--amber); width:0%; transition:width .3s; }
  .bar.done>div { background:var(--green); }
  .next { font-size:13px; color:var(--navy); background:#f3f7fb; border:1px solid var(--line);
    border-radius:8px; padding:10px; margin-top:8px; }
  table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-size:12px; text-transform:uppercase; }
  .exportrow { margin-top:12px; display:flex; gap:8px; align-items:center; }
  .muted { color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>Kachin GPT — Fine-Tuning Studio</h1>
  <div class="dot" id="health">checking…</div>
</header>

<div class="grid">
  <!-- LEFT: assistant chat -->
  <div class="card">
    <h2>Assistant</h2>
    <div id="log"></div>
    <div class="chatrow">
      <input id="chatin" placeholder="Ask anything about preparing the recordings..." />
      <button id="send">Send</button>
    </div>
    <p class="muted">The assistant runs on your local Ollama model. Corpus numbers it
      quotes are computed by the studio, not guessed.</p>
  </div>

  <!-- RIGHT: add clip + dashboard -->
  <div>
    <div class="card">
      <h2>Add a recording</h2>
      <div class="drop" id="drop">Drop a WAV clip here, or click to choose
        <input type="file" id="file" accept=".wav" hidden />
      </div>
      <div class="verdict" id="verdict"></div>
      <label for="spk">Speaker ID <span class="muted">(e.g. spk01 — never a real name)</span></label>
      <input type="text" id="spk" value="spk01" />
      <label for="txt">Kachin text this clip reads</label>
      <textarea id="txt" placeholder="The exact Jinghpaw sentence spoken in this clip..."></textarea>
      <button id="addbtn" disabled style="margin-top:12px;width:100%">Validate &amp; add to corpus</button>
    </div>

    <div class="card" style="margin-top:18px">
      <h2>Corpus</h2>
      <div class="stats">
        <div class="stat"><span class="big" id="s-min">0</span><small>minutes</small></div>
        <div class="stat"><span class="big" id="s-clip">0</span><small>clips</small></div>
        <div class="stat"><span class="big" id="s-spk">0</span><small>speakers</small></div>
      </div>
      <div class="bar" id="bar"><div id="barfill"></div></div>
      <div class="next" id="next">Loading…</div>
      <table id="spktable" style="display:none">
        <thead><tr><th>Speaker</th><th>Clips</th><th>Minutes</th></tr></thead>
        <tbody id="spkbody"></tbody>
      </table>
      <div class="exportrow">
        <button class="ghost" id="export">Export training dataset</button>
        <span class="muted" id="exportmsg"></span>
      </div>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let pendingFile = null;

  function addMsg(who, text) {
    const d = document.createElement("div");
    d.className = "msg " + who; d.textContent = text;
    $("log").appendChild(d); $("log").scrollTop = $("log").scrollHeight;
  }

  async function refreshHealth() {
    try {
      const h = await (await fetch("/api/health")).json();
      $("health").innerHTML = h.ollama
        ? `assistant: <b>on</b> (${h.ollama_model})`
        : `assistant: <b>offline</b> — studio still works`;
    } catch { $("health").textContent = "backend unreachable"; }
  }

  async function refreshCorpus() {
    const c = await (await fetch("/api/corpus")).json();
    $("s-min").textContent = c.minutes;
    $("s-clip").textContent = c.clips;
    $("s-spk").textContent = c.speakers;
    const pct = Math.min(100, Math.round((c.minutes / c.target_minutes) * 100));
    $("barfill").style.width = pct + "%";
    $("bar").classList.toggle("done", c.ready_to_train);
    $("next").textContent = c.next_step;
    const spk = Object.entries(c.per_speaker);
    if (spk.length) {
      $("spktable").style.display = "table";
      $("spkbody").innerHTML = spk.map(([id, v]) =>
        `<tr><td>${id}</td><td>${v.clips}</td><td>${v.minutes}</td></tr>`).join("");
    }
  }

  // ---- chat ----
  async function send() {
    const text = $("chatin").value.trim(); if (!text) return;
    addMsg("you", text); $("chatin").value = ""; $("send").disabled = true;
    try {
      const fd = new FormData(); fd.append("message", text);
      const r = await (await fetch("/api/chat", { method:"POST", body: fd })).json();
      addMsg("bot", r.reply);
    } catch { addMsg("bot", "Could not reach the backend."); }
    finally { $("send").disabled = false; }
  }
  $("send").addEventListener("click", send);
  $("chatin").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

  // ---- file drop / choose ----
  const drop = $("drop");
  drop.addEventListener("click", () => $("file").click());
  drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("hot"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("hot"));
  drop.addEventListener("drop", (e) => {
    e.preventDefault(); drop.classList.remove("hot");
    if (e.dataTransfer.files.length) pickFile(e.dataTransfer.files[0]);
  });
  $("file").addEventListener("change", (e) => { if (e.target.files.length) pickFile(e.target.files[0]); });

  async function pickFile(f) {
    pendingFile = f;
    drop.textContent = f.name;
    // instant validation preview
    const fd = new FormData(); fd.append("clip", f);
    const v = $("verdict"); v.className = "verdict"; v.textContent = "Validating...";
    v.style.display = "block";
    try {
      const r = await (await fetch("/api/validate", { method:"POST", body: fd })).json();
      v.className = "verdict " + r.verdict;
      const issues = (r.issues || []).join("  ·  ");
      v.textContent = `${r.verdict} — ${r.duration_s ?? "?"}s`
        + (issues ? "  ·  " + issues : "");
      $("addbtn").disabled = (r.verdict === "FAIL");
    } catch { v.textContent = "Could not validate."; }
  }

  $("addbtn").addEventListener("click", async () => {
    if (!pendingFile) return;
    const text = $("txt").value.trim();
    if (!text) { alert("Please type the Kachin text this clip reads."); return; }
    $("addbtn").disabled = true;
    const fd = new FormData();
    fd.append("clip", pendingFile);
    fd.append("speaker_id", $("spk").value.trim() || "spk01");
    fd.append("text", text);
    try {
      const res = await fetch("/api/add", { method:"POST", body: fd });
      const r = await res.json();
      if (!res.ok) { alert(r.error || "Not added."); return; }
      addMsg("bot", `Added ${r.added.file} (${r.added.duration_s}s). ${r.corpus.next_step}`);
      $("txt").value = ""; pendingFile = null;
      drop.textContent = "Drop a WAV clip here, or click to choose";
      $("verdict").style.display = "none";
      refreshCorpus();
    } catch { alert("Could not add the clip."); }
    finally { $("addbtn").disabled = false; }
  });

  $("export").addEventListener("click", async () => {
    const r = await (await fetch("/api/export", { method:"POST" })).json();
    $("exportmsg").textContent = `Wrote ${r.rows} rows → ${r.path}`;
  });

  addMsg("bot", "Welcome. Drop in your voice actor's WAV clips on the right, add the "
    + "Kachin text each one reads, and I'll validate them and track the corpus. "
    + "Ask me anything as you go.");
  refreshHealth(); refreshCorpus();
</script>
</body>
</html>
