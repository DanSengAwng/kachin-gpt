name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lightweight deps
        run: pip install ruff pytest numpy
      - name: Lint
        run: ruff check .
      - name: Fast tests (no model download)
        run: pytest -q
      - name: Fast verification
        run: python verify_phase1.py --fast

